# v3 phase 2 — confidence-head training (Change 1 + Change 3)
#
# Trains ONLY conf_head_per_pos; the delta + trunk are loaded frozen
# from a phase-1 checkpoint. Run once per top-3 phase-1 checkpoint:
#
#     python -m delta_model.train --phase conf \
#         --config delta_model/configs/v3_phase2_conf_llada_variant_c.yaml \
#         --resume_from ckpts/v3_phase1_delta_llada_variant_c/best_delta_gsm8k_step<N>.pt \
#         --override backbone.fast_dllm_path=external/Fast-dLLM/v1 \
#         --override checkpoint.out_dir=ckpts/v3_phase2_conf_<N>
#
# Supervision: free-running DAgger labels (Change 3) — the conf head
# learns commit safety on the delta's own free-running states. The
# Change-1 tiered target is used for the per-position label.
#
# Selection: best checkpoint by hybrid GSM8K accuracy among evals whose
# rollback_rate lands in [0.5, 0.7] (best_conf_step<N>.pt).
#
# `model.*` must match the phase-1 checkpoint (the delta architecture is
# fixed by the loaded weights). Keep d_model / n_heads / n_layers /
# d_ff_inner / detach_conf_features identical to the phase-1 config.

run_name:          v3_phase2_conf_llada_variant_c_seed42
seed:              42

backbone:
  model:           llada
  fast_dllm_path:  null

# DAgger rollout knobs (read by run_conf_phase via getattr on cfg).
# The buffer is collected once — the rollout is delta-only (ungated) and
# the delta is frozen, so the free-running trajectory is fixed.
conf_rollout_prompts:        64          # GSM8K-train prompts rolled out
conf_batch_size:             64          # conf-head minibatch (one delta pass = one row)

data:
  # phase 2 does not read the teacher-forced cache, but keep these so
  # the config validates against the shared schema.
  cache_root:      cache_v1_20k/llada
  manifest:        cache_v1_20k/llada/manifest.json
  val_split:       test
  num_workers:     0
  batch_size:      256
  pin_memory:      false
  preload:         false
  mask_token_id:   126336

model:
  variant:         C
  d_model:         4096
  n_heads:         32
  n_layers:        2                     # MUST match the phase-1 checkpoint
  d_ff_inner:      10944
  dropout:         0.20
  detach_conf_features: true

optim:
  optimizer:       adamw
  lr:              1.0e-4
  weight_decay:    0.03
  betas:           [0.9, 0.95]
  warmup_steps:    0
  max_steps:       1000                  # short — conf head overfits fast vs a frozen delta
  scheduler:       cosine
  grad_clip:       1.0
  precision:       bf16

loss:
  conf_target:     tiered
  conf_topk:       10
  decode_factor:   1.0                   # Fast-dLLM factor for the DAgger rollout (match collect)

log:
  framework:       wandb
  project:         tata-delta-model
  group:           v3-phase2-llada
  log_every:       25
  val_every:       100                   # frequent — the rollback-rate band is the selector
  gsm8k_subset:    50
  gsm8k_per_pos_threshold: 0.75

checkpoint:
  every:           500
  keep_last:       3
  out_dir:         ckpts/v3_phase2_conf_llada_variant_c
